<!-- Modal Backdrop -->
@if (modalService.isOpen()) {
<div class="modal-backdrop" (click)="closeModal()"></div>
}

<!-- Modal -->
<div class="new-request-modal" [class.open]="modalService.isOpen()" [class.closing]="modalService.isClosing()">
  <div class="modal-header">
    <h3>
      @if (modalService.isEditing()) {
      <i class="fas fa-edit"></i>
      Edit Request
      } @else {
      <i class="fas fa-plus-circle"></i>
      New Request
      }
    </h3>
    <button class="modal-close" (click)="closeModal()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="modal-body">

    <!-- Collection Select -->
    <div class="form-field">
      <label class="form-label">
        <i class="fas fa-folder"></i>
        Collection
      </label>
      <select class="form-select"
              [ngModel]="modalService.selectedCollectionId()"
              (ngModelChange)="updateSelectedCollectionId($event)">

        <option value="" disabled>Select a collection</option>
        @for (col of collections(); track col.collectionId) {
          <option [value]="col.collectionId">{{ col.name }}</option>
        }
        <option value="new" class="new-option">+ Create new collection</option>
      </select>
    </div>

    <!-- New Collection Input (conditional) -->
    @if (showNewCollectionInput()) {
    <div class="form-field new-collection-field">
      <label class="form-label">
        <i class="fas fa-folder-plus"></i>
        New Collection Name
      </label>
      <input
        type="text"
        class="form-input"
        placeholder="e.g., My Awesome API"
        [ngModel]="modalService.newCollectionName()"
        (ngModelChange)="updateNewCollectionName($event)"
        />
    </div>
    }
  </div>

  <div class="modal-footer">
    <button class="modal-btn cancel" (click)="closeModal()">
      Cancel
    </button>
    <button
      class="modal-btn save"
      (click)="save()"
      [disabled]="!isValid()">
      <i class="fas fa-save"></i>
      {{ modalService.isEditing() ? 'Update Request' : 'Save Request' }}
    </button>
  </div>
</div>

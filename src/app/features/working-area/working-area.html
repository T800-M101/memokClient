<main class="working-area" id="workingArea">
  <div class="content-wrapper">
    <div class="workspace">
      @if(activeRequest(); as req){
      <div class="request-page">
        <app-request-bar />
        <app-config-bar
          [requestData]="requestsService.activeRequest()"
          (change)="requestsService.updateActiveRequest($event)">
        </app-config-bar>
        <app-response-section />
      </div>
      } @else {
      <div class="empty-state-container">
        <div class="empty-state">
          <div class="empty-state-icon">
            <i class="fas fa-code-branch"></i>
          </div>
          <h3 class="empty-state-title">No Active Request</h3>
          <p class="empty-state-message">
            Select a request from the sidebar or create a new one to get started.
          </p>
          <div class="empty-state-actions">
            <button class="create-request-btn" (click)="createNewRequest()">
              <i class="fas fa-plus"></i>
              Create New Request
            </button>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</main>

<!-- Overlay Menu (mismo tamaño que sidebar) -->
<div class="overlay-menu" [class.open]="isMenuOpen" [class.closing]="isClosing">

  <div class="overlay-menu-header">
    <button class="close-menu-btn" (click)="closeMenu()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <ul class="overlay-nav-menu">
    <li (click)="importCurl()">
      <i class="fas fa-cloud-upload-alt"></i>
      <span (click)="toggleImportDrawer()">Import cURL</span>
    </li>

    <!-- Import cURL Drawer -->
    <div class="drawer" [class.open]="isImportDrawerOpen()" [class.closing]="isImportDrawerClosing()">
      <div class="drawer-content">
        <div class="drawer-header">
          <h4>Import cURL</h4>
          <button class="drawer-close" (click)="closeImportDrawer()">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="drawer-body">
          <textarea [(ngModel)]="curlCommand"
            placeholder="Paste your cURL command here...&#10;&#10;Example:&#10;curl -X GET &quot;https://api.example.com/users&quot; -H &quot;Authorization: Bearer token&quot;"
            class="drawer-textarea" rows="5"></textarea>
        </div>

        <div class="drawer-footer">
          <button class="drawer-btn cancel" (click)="closeImportDrawer()">Cancel</button>
          <button class="drawer-btn save" (click)="importCurl()" [disabled]="!curlCommand.trim()">
            <i class="fas fa-cloud-upload-alt"></i>
            Import
          </button>
        </div>
      </div>
    </div>

    <li>
      <i class="fas fa-globe"></i>
      <span>Environments</span>
    </li>
  </ul>
</div>
